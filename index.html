<!--Login.html-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="login-card">

    <h3 class="text-center mb-4">Login</h3>
    <div id="messageBox"></div>
    <form id="loginForm">

      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="Enter email" required>
      </div>

      <div class="mb-3 password-wrapper">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>

        <span class="toggle-icon" onclick="togglePassword('loginPassword', this)">
          <i class="fa-solid fa-eye"></i>
        </span>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
      
        <div>
          <input type="checkbox" id="remember">
          <label for="remember"> Remember me</label>
        </div>

        <a href="#" class="forgot-link">Forgot Password?</a>

      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>

    </form>

    <p class="text-center mt-3">
      Don't have an account? <a href="register.html">Register</a>
    </p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
