<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="login-card">

    <h3 class="text-center mb-4">Register</h3>
    <div id="messageBox"></div>
    <form id="registerForm" autocomplete="off">

      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter name" autocomplete="off" required>
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email" autocomplete="off" required>
      </div>

      <div class="mb-3 password-wrapper">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="off" required>

        <span class="toggle-icon" onclick="togglePassword('password', this)">
          <i class="fa-solid fa-eye"></i>
        </span>
      </div>

      <div class="mb-3 password-wrapper">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>

        <span class="toggle-icon" onclick="togglePassword('confirmPassword', this)">
          <i class="fa-solid fa-eye"></i>
        </span>
      </div>

      <button type="submit" class="btn btn-success w-100">Register</button>

    </form>

    <p class="text-center mt-3">
      Already have an account? <a href="index.html">Login</a>
    </p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
